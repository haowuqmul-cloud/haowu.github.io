# ==================== 基本设置 ====================
locale: "en-US"
title: "Hao Wu"
title_separator: "-"
name: &name "Hao Wu"
description: &description "PhD Candidate in Finance at Queen Mary University of London"
url: "https://haowuqmul-cloud.github.io/haowu.github.io"   # ← 改成你的实际网站地址
baseurl: "" 
repository: "haowuqmul-cloud/haowu.github.io"

# ==================== 作者信息（左侧边栏）===================
author:
  avatar: "profile.png"           # 把你的照片上传到 /images/ 文件夹并改名
  name: "Hao Wu"
  bio: "PhD Candidate in Finance | Queen Mary University of London"
  location: "London, UK"
  email: "hao.wu@qmul.ac.uk"
  
  # 学术链接（保留你有的）
  researchgate: "https://www.researchgate.net/profile/Hao-Wu-501"

# ==================== 导航栏（保留这些就够）===================
# 如果有 _data/navigation.yml 文件，优先在那边改；否则在这里也生效

# ==================== 其他保持默认（不需要动）===================
future: true
words_per_minute: 160

# Publication categories
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# 其他高级设置保持原样（不用删）
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - vendor

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# ==================== 自定义样式 - 导航栏右对齐 + 悬停效果 ====================
style: |
  /* 强制右对齐 */
  .masthead__inner-wrap,
  .masthead,
  .nav__list,
  .masthead__menu,
  .visible-links {
    justify-content: flex-end !important;
    margin-left: auto !important;
    text-align: right !important;
  }

  .masthead__menu-item,
  .nav__links li,
  .visible-links li {
    margin-left: 2rem !important;
    margin-right: 0 !important;
  }

  /* 悬停效果 */
  .masthead__menu-item a,
  .nav__links a {
    position: relative;
    color: #222 !important;
    font-weight: 500;
    transition: all 0.25s ease !important;
  }

  .masthead__menu-item a:hover,
  .nav__links a:hover {
    color: #0066cc !important;
    transform: translateY(-2px);
  }

  /* 下划线动画 */
  .masthead__menu-item a::after,
  .nav__links a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: 4px;
    left: 0;
    background-color: #0066cc;
    transition: width 0.3s ease;
  }

  .masthead__menu-item a:hover::after,
  .nav__links a:hover::after {
    width: 100%;
  }
